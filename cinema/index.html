<!DOCTYPE html>
<html land="en">
<head>
	<meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Box Office</title>
	<style>
	  body {
	    margin: auto;
	    width: 100%;
	    padding: 50px;
	    background-image: url('images/cinema.jpg');
	    background-size: 100vw 100vh;
	    color: white;
	  }
	  canvas {
	    border:1px solid #d3d3d3;
	    background-color: #f1f1f1;
	    background-image: url('images/cinema.jpg');
	    background-size: 950px 600px;
	  }
	  button {
	    width: 150px;
	    height: 50px;
	    display: block;
	    float: left;
	    border-radius: 10px;
	    margin: 20px;
	  }
	  #divControl {
	  	width: 200px;
	  	height: 600px;
	  	float: left;
	  }
	</style>
</head>
<body>
	<div id="divControl">
	  <p>Click on a Room to select seats</p>
	  <button id="f" type="button" onclick="show_seats(event)">Room Florence</button>
	  <button id="r" type="button" onclick="show_seats(event)">Room Ronald</button>
	  <div id="divTable"></div>
	  <button id="btnBook" onclick="confirm_booking()">Confirm Booking</button>
	</div>
  <canvas id="myCanvas"></canvas>
  
	<script>
	  const cnvWidth = 950;
	  const cnvHeight = 600;
	  const cnv = document.getElementById("myCanvas");
	  cnv.style.backgroundImage = "url('images/cinema.jpg')";
	  cnv.addEventListener("mousedown", choose_seats, false);
	  cnv.width = cnvWidth;
	  cnv.height = cnvHeight;
	  const ctx = cnv.getContext("2d");
	  const seatWidth = 40;
	  const seatHeight = 50;
	  const offsetX = 0;
	  const offsetY = 50;
	  const white_chair = new Image();
	  const green_chair = new Image();
	  const red_chair = new Image();
	  white_chair.src = "images/white_chair.png";
	  green_chair.src = "images/green_chair.png";
	  red_chair.src = "images/red_chair.png";
	  var roomID = "";
	  var chosenSeats = []; // used to store chosen seats
	  var total = 0; // the total price of the chosen seats
	  var strTable = ""; // used to create the price table
	  var seats = []; // Array declaration - empty, and it will be loaded from XML file
	  // XML -The XMLHttpRequest object is used to exchange data with a server behind the scenes.

	  // Define the seat Class
	  function seat(room, row, number, price, status, x, y) {
	    this.room = room;
	    this.row = row;
	    this.number = number;
	  	this.price = price;
	  	this.status = status;
	    this.x = x;
	    this.y = y;
	    this.draw = function () {
	      let chair;
	      if (confirmed) {
	        chair = red_chair;
	      }
	      else {
	        if (chosenSeats.includes(this)) {
	          chair = white_chair;
	          chosenSeats.splice(chosenSeats.indexOf(this), 1); // delete it from the chosen seat array, so it can be chosen again
	          total -= this.price;
	        }
	        else {
	          chair = green_chair;
	          chosenSeats.push(this); // store the chosen seat
	          total += this.price;
	        }
	        draw_table();
	      }
	      ctx.clearRect(this.x, this.y, seatWidth, seatHeight);
	      ctx.drawImage(chair, this.x, this.y, seatWidth, seatHeight);
	      var seatCode = String.fromCharCode(this.row + 64) + this.number;
	      ctx.font = "12px Arial";
	      ctx.textAlign = "center";
	      ctx.fillText(seatCode, this.x + 20, this.y + 25);
	    }
	  }  

	  // first for IE7+, Firefox, Chrome, Opera, Safari; second for IE5, IE6
	  var xmlhttp = window.XMLHttpRequest ? new XMLHttpRequest() : new ActiveXObject("Microsoft.XMLHTTP");
		xmlhttp.open("GET", "cinema.xml", false);
		xmlhttp.send();
		var xmlDoc = xmlhttp.responseXML;
		var roomList = xmlDoc.getElementsByTagName("Room");
		var rowList;
		var seatList;
	  var room = '';
		var row = 0;
		var number = 0;
		var price = 0;
	  var status = '';
	  var seatX = 0;
	  var seatY = 0;

	  var nor = 0;  // number of rows
	  var nos = 0;  // number of seats
	  var nom = roomList.length;  // number of rooms
	  for (var k = 0; k < nom; k++) {
	    if (k == 0) {
	      room = 'f';
	    }
	    else {
	      room = 'r';
	    }
	    rowList = roomList[k].getElementsByTagName("Row");
	    nor = rowList.length;
	    for (var j = 0; j < nor; j++) {
	      row = j + 1;
	      seatList = rowList[j].getElementsByTagName("Seat");
	      nos = seatList.length;
	      if (j < 2) price = 20;
	      else if (j > 1 && j < 5) price = 22;
	      else price = 25;
	      for (var i = 0; i < nos; i++) {
	        number = i + 1;
	        status = seatList[i].getElementsByTagName("Status")[0].childNodes[0].nodeValue;
	    		seats.push(new seat(room, row, number, price, status, seatX, seatY));
	    	}
	    }
	  }

    let roomSeats = []; // seats in a particular room
	  function show_seats(event) {
	    ctx.clearRect(0, 0, cnvWidth, cnvHeight);
	    cnv.style.opacity = 0.93;    
	    cnv.style.backgroundImage = "none";
	    ctx.beginPath();
	    ctx.moveTo(0, 50);
	    ctx.lineTo(cnvWidth, 50);
	    ctx.stroke();
	    ctx.font = "30px Arial";
	    ctx.textAlign = "center";
	    ctx.fillText("SCREEN", cnvWidth / 2, 40);
	    roomID = event.target.id;
      roomSeats = seats.filter(seat => seat.room === roomID);
      var num_seats = roomSeats.length;
	    for (var i = 0; i < num_seats; i++) {
	      seatY = roomSeats[i].row * seatHeight + offsetY;
	      let chair = roomSeats[i].status === "booked" ? red_chair : white_chair;
	      let rowNo = roomSeats[i].row;
	      let numR = roomSeats.filter(seat => seat.row === rowNo).length;
	      let seat_number = roomSeats[i].number;
	      seatX = cnvWidth / 2 - numR / 2 * seatWidth + (seat_number - 1) * seatWidth + offsetX;
        ctx.drawImage(chair, seatX, seatY, seatWidth, seatHeight);
        var seatCode = String.fromCharCode(roomSeats[i].row + 64) + roomSeats[i].number;
        ctx.font = "12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(seatCode, seatX + 20, seatY + 25);
        roomSeats[i].x = seatX;
        roomSeats[i].y = seatY;
	    }
	    chosenSeats.splice(0, chosenSeats.length); // once the room button is clicked, the chosen seat array is emptied.
	    total = 0;
	    document.getElementById("divTable").innerHTML = "";
	  }

	  function choose_seats(event) {
	    var rect = cnv.getBoundingClientRect(); // the coordinates of the tip of the mouse arrow are not those in the canvas
	    var x = event.x - rect.left;            // so offsets need to be taken into account
	    var y = event.y - rect.top;
	    roomSeats.forEach((seat) => {
	    	if ((x > seat.x && x < seat.x + seatWidth) && (y > seat.y && y < seat.y + seatHeight)) {
          seat.status === "booked" ? alert("You cannot choose a booked seat!") : seat.draw();
	      }
    	});
	  }

	  function draw_table() {
	    strTable = "<table border='1|1'><tr><th>Row/Seat Number</th><th>Price</th></tr>";
	    for (var i = 0; i < chosenSeats.length; i++) {
	      var rowLetter = String.fromCharCode(chosenSeats[i].row + 64);
	      strTable += "<tr>";
	      strTable += "<td>" + rowLetter + chosenSeats[i].number + "</td>";
	      strTable += "<td>" + "$" + chosenSeats[i].price + "</td>";
	      strTable += "</tr>";
	    }
	    strTable += "<tr>";
	    strTable += "<td>" + "Total" + "</td>";
	    strTable += "<td>" + "$" + total + "</td>";
	    strTable += "</tr>";
	    strTable += "</table>";
	    document.getElementById("divTable").innerHTML = strTable;
	  }

	  var confirmed = false;
	  function confirm_booking() {
	    if (chosenSeats.length == 0) {
	      alert("You have not chosen any seat yet!");
	    }
	    else {
	      confirmed = true;
	      for (var i = 0; i < chosenSeats.length; i++) {
	        chosenSeats[i].draw();
	        // Modify the status of a just booked seat
	        var indexChosen = seats.indexOf(chosenSeats[i]);
	        seats[indexChosen].status = "booked";
	        var roomIndex;
	        if (roomID == "btnF") {
	          roomIndex = 0;
	        }
	        else if (roomID == "btnR") {
	          roomIndex = 1;
	        }
	        var rowIndex = chosenSeats[i].row - 1;
	        var seatIndex = chosenSeats[i].number -1;
	        // Modify the XML file
	        xmlhttp.onreadystatechange = function() {
	          if (this.readyState == 4 && this.status == 200) {
	            var xmlDoc = this.responseXML;
	            var x = xmlDoc.getElementsByTagName("Room")[roomIndex].getElementsByTagName("Row")[rowIndex].getElementsByTagName("Seat")[seatIndex].getElementsByTagName("Status")[0].childNodes[0];
	            x.nodeValue = "booked";
	          }
	        };
	        xmlhttp.open("GET", "cinema.xml", true);
	        xmlhttp.send();
	      }
	      chosenSeats.splice(0, chosenSeats.length); // once the room button is clicked, the chosen seat array is emptied.
	      total = 0;
	      document.getElementById("divTable").innerHTML = "";
	      alert("Booking is confirmed!");
	      confirmed = false;
	    }
	  }
	</script>
</body>
</html>
