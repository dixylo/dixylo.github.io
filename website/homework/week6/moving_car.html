<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
canvas {
    border:1px solid #d3d3d3;
    background-color: #f1f1f1;
}
</style>
</head>
<body>
<script>

var wheel1;
var wheel2;
var wheel1X = 0;
var wheel2X = -100;
var wheelY = 270;
var wheelR = 22;
var wheelbase = wheel1X - wheel2X;
var sedanX = -152;
var sedanY = 210;
var sedanW = 160;
var sedanH = 60;
var velocity = 0.1; // in px/ms
var interval = 10;
var canvasW = 500;
var canvasH = 300;


function startMoving() {
    wheel1 = new wheel(wheelR, "blue", wheel1X, wheelY);
    wheel2 = new wheel(wheelR, "blue", wheel2X, wheelY);
    carArea.start();
}

var carArea = {
    canvas : document.createElement("canvas"),
    start : function() {
        this.canvas.width = canvasW;
        this.canvas.height = canvasH;
        this.context = this.canvas.getContext("2d");
        document.body.insertBefore(this.canvas, document.body.childNodes[0]);
        this.frameNo = 0;
        this.interval = setInterval(updateCarArea, interval);
    },
    stop : function() {
        clearInterval(this.interval);
    },
    clear : function() {
        this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
    }
}

function wheel(radius, color, x, y) {
    this.radius = radius;
    this.angle = 0;
    this.x = x - wheelR;
    this.y = y;
    this.update = function() {
        ctx = carArea.context;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, 2 * Math.PI);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.beginPath();
        ctx.lineWidth="1";
        ctx.strokeStyle="black";
        ctx.moveTo(this.radius / -1.414, this.radius / -1.414);
        ctx.lineTo(this.radius / 1.414, this.radius / 1.414);
        ctx.stroke();
        ctx.beginPath();
        ctx.lineWidth="1";
        ctx.strokeStyle="black";
        ctx.moveTo(this.radius / -1.414, this.radius / 1.414);
        ctx.lineTo(this.radius / 1.414, this.radius / -1.414);
        ctx.stroke();
        ctx.restore();
    }
}

function updateCarArea() {

    carArea.clear();

    wheel1.angle += velocity * interval / wheelR;
    wheel2.angle += velocity * interval / wheelR;
    if (sedanX > canvasW) {
      wheel1.x = -wheelR;
      wheel2.x = wheel1.x - wheelbase;
      sedanX = -152;
    }
    wheel1.x += velocity * interval;
    wheel2.x += velocity * interval;
    sedanX += velocity * interval;


    wheel1.update();
    ctx.beginPath();
    ctx.rect(sedanX, sedanY, sedanW, sedanH);
    ctx.fillStyle = "orange";
    ctx.fill();
    ctx.beginPath();
    ctx.rect(0, canvasH - 10, canvasW, 10);
    ctx.fillStyle = "green";
    ctx.fill();
    wheel1.update();
    wheel2.update();
}
</script>
<br/>
<button id = "btnStart" onclick="startMoving()">Start off</button>
</body>
</html>
