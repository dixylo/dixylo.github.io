<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>JS Bin</title>
</head>
<body onLoad="init();">
  <div>
<canvas id="myCanvas" width="500" height="500" >
  </canvas>
  </div>
</body>
<script>
  var mycanvas=document.getElementById("myCanvas");
  var cntx=mycanvas.getContext("2d");
  var c1=0.25;
  var c2=0.5;
  var c3=0.75;
  var dc1=0.05;
  var dc2=0.05;
  var dc3=0.05;
  function init()
  {
    var myMove=setInterval(radGrad, 100);
  }
  function radGrad()
  {
    var mygradient=cntx.createRadialGradient(200, 200, 10, 300, 300, 300);
    mygradient.addColorStop(0,"red");
    mygradient.addColorStop(c1,"yellow");
    mygradient.addColorStop(c2,"green");
    mygradient.addColorStop(c3,"blue");
    mygradient.addColorStop(1,"purple");
    cntx.fillStyle=mygradient;
    cntx.fillRect(0, 0, 500, 500);

    c1=c1+dc1;
    c2=c2+dc2;
    c3=c3+dc3;

    if (c3>0.94) {dc1= -dc1 ;dc2= -dc2 ; dc3= -dc3 ;}
    if (c3<0.74) {dc1= -dc1 ;dc2= -dc2 ; dc3= -dc3 ;}
  }
</script>
</html>
