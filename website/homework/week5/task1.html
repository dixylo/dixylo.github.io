<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Frog</title>
</head>
<body onLoad="init();">
  <canvas id="myCanvas" width="500" height="500" style="border:12px solid DarkGreen;">
    Your browser does not support the HTML5 canvas tag.
  </canvas>
</body>
<script>
  var c=document.getElementById("myCanvas");
  var ctx=c.getContext("2d");
  ctx.fillStyle="#cc99ff";
  ctx.fillRect(20, 20, 460, 460);
  ctx.fillStyle="#009966";
  ctx.fillRect(140, 390, 45, 85);
  ctx.fillStyle="#009966";
  ctx.fillRect(313, 390, 45, 85);
  ctx.beginPath();
  ctx.arc(250, 400, 65, 0, Math.PI * 2, true);
  ctx.fillStyle="#33ff99";
  ctx.fill();
  ctx.closePath();
  ctx.lineWidth="15";
  ctx.strokeStyle="black";
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(250, 250, 100, 0, Math.PI * 2, true);
  ctx.fillStyle="#33ff99";
  ctx.fill();
  ctx.closePath();
  ctx.lineWidth="4";
  ctx.strokeStyle="black";
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(250, 260, 80, 0, Math.PI, false);
  ctx.closePath();
  ctx.lineWidth="10";
  ctx.strokeStyle="red";
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(180, 200, 60, 0, Math.PI, true);
  ctx.fillStyle="#ffff66";
  ctx.fill();
  ctx.closePath();
  ctx.lineWidth="4";
  ctx.strokeStyle="green";
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(320, 200, 60, 0, Math.PI, true);
  ctx.fillStyle="#ffff66";
  ctx.fill();
  ctx.closePath();
  ctx.lineWidth="4";
  ctx.strokeStyle="green";
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(190, 180, 10, 0, Math.PI * 2, true);
  ctx.fillStyle="black";
  ctx.fill();
  ctx.closePath();
  ctx.lineWidth="5";
  ctx.strokeStyle="green";
  ctx.stroke();

  var x1=320;
  var x2=180;
  var dx=2;
  function init() {
    var moveEyes=setInterval(eyeMover, 50);
  }

  function eyeMover() {
    ctx.clearRect(285, 167, 80, 26);
    ctx.fillStyle="#ffff66";
    ctx.fillRect(285, 167, 80, 26);
    ctx.beginPath();
    ctx.arc(x1, 180, 10, 0, Math.PI * 2, true);
    ctx.fillStyle="black";
    ctx.fill();
    ctx.closePath();
    ctx.lineWidth="5";
    ctx.strokeStyle="green";
    ctx.stroke();
    ctx.clearRect(145, 167, 80, 26);
    ctx.fillStyle="#ffff66";
    ctx.fillRect(145, 167, 80, 26);
    ctx.beginPath();
    ctx.arc(x2, 180, 10, 0, Math.PI * 2, true);
    ctx.fillStyle="black";
    ctx.fill();
    ctx.closePath();
    ctx.lineWidth="5";
    ctx.strokeStyle="green";
    ctx.stroke();
    x1=x1+dx;
    x2=x2+dx;
    if (x1>350 || x1<300) {
      dx=-dx;
    }
  }



</script>


</html>
