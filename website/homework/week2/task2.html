<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Task-2</title>
<style>
	button {padding: 5px 10px;}
	input {width: 50px;}
	#para {
		width: 500px;
		padding: 20px;
	}
</style>
<script>
	function setSize() {
		var newWidth = document.getElementById("wRange").value;
		var newHeight = document.getElementById("hRange").value;
		document.getElementById("para").style.width = newWidth + "px";
		document.getElementById("para").style.height = newHeight + "px";
	}

	function setColor() {
		document.getElementById("para").style.backgroundColor = document.getElementById("bgColor").value;
		document.getElementById("para").style.color = document.getElementById("txtColor").value;
	}

	function setFont() {
		var ft = document.getElementById("fontType");
		var tType= ft.options[ft.selectedIndex].text;
		var fw = document.getElementById("fontWeight");
		var tWeight= fw.options[fw.selectedIndex].text;
		document.getElementById("para").fontFamily = tType;
		document.getElementById("para").fontWeight = tWeight;
	}
</script>
</head>

<body>
	<h1>Task-2</h1><br>
	<div>
		Slide the block to adjust the width of the paragraph.<br>
		<input type = "range" id = "wRange" value = "5000"><br>
		Slide the block to adjust the height of the paragraph.<br>
		<input type = "range" id = "hRange" value = "5000"><br>
		<button onclick="setSize()"> Apply </button><br>
	</div>
	<div>
		Choose a color from below for the background.<br>
		<input type = "color" id = "bgColor" value = "#ff0000">
		Choose a color from below for the text.<br>
		<input type = "color" id = "txtColor" value = "#00ff00">
		<button onclick="setColor()"> Apply </button><br>
	</div>
	<br>
	<div>
		<select id = "fontType">
  		<option value="Times New Roman">Times New Roman</option>
  		<option value="Arial">Arial</option>
  		<option value="Courier New">Courier New</option>
  		<option value="Georgia">Georgia</option>
			<option value="Verdana">Verdana</option>
  		<option value="Lucida Console">Lucida Console</option>
		</select>
		<select id = "fontWeight">
  		<option value="normal">normal</option>
  		<option value="bold">bold</option>
		</select>
		<button onclick="setFont()"> Apply </button><br>
	</div>
	<div id = "para" style = "background-color: blue;">
		<p id = "text">VBI LIBERTAS IBI PATRIA</p>
	</div>

</body>
</html>
