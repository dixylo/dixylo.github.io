<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Task-3</title>
<style>
	body {
		width: 20%;
		background-color: #FFFFCC;
	}
	h1 {
		font-family: "Lucida Console";
		font-size: 20px;
		font-style: italic;
		color: blue;
		background-color: #FFFF00;
		padding: 10px;
	}
	#plus #minus {
		font-weight: bold;
	}
	#cal {
		background-color: green;
	}
</style>
</head>

<body>
	<h1>Calculation</h1><br>
	<div id = "cal">
	<input name = "operator" type = "radio" id = "plus" onclick = "setBackgroundColor()" checked> Plus <br>
	<input name = "operator" type = "radio"  id = "minus" onclick = "setBackgroundColor()"> Minus <br>
	<input type = "text" id = "operand">
	<button type = "button" id = "btn" onclick = "myCalculation()">Total</button><br>
	<p id = "display"></p>
	</div>
	<script>
		function myCalculation() {
			var result;
			var operand1;
			var operand2;
			if (document.getElementById("display").innerHTML == "") {
				operand1 = 0;
			} else {
				var operand1 = parseFloat(document.getElementById("display").innerHTML);
			}
			if (document.getElementById("operand").value == "") {
				operand2 = 0
			} else {
				var operand2 = parseFloat(document.getElementById("operand").value);
			}
			if (document.getElementById("plus").checked){
				result = operand1 + operand2;
			} else {
				result = operand1 - operand2;
			}
			document.getElementById("display").innerHTML = result;
		}

		function setBackgroundColor() {
			if (document.getElementById("plus").checked){
				document.getElementById("btn").innerHTML = "Total";
				document.getElementById("cal").style.backgroundColor = "green";
			} else {
				document.getElementById("btn").innerHTML = "Left";
				document.getElementById("cal").style.backgroundColor = "red";
			}
		}
	</script>
</body>
</html>
