<!DOCTYPE HTML>
<html>
<head>
<title>butterfly flying over daisies</title>
<style>
.example_path {
	position: relative;
	overflow: hidden;
	width: 880px;
	height: 780px;
	border: 1px solid #000;
	background: url("flowers-daizy.jpg");
}

.example_path .example_block {
	position: absolute;
	background: url("butterfly.gif");
	background-repeat: no-repeat;
	width: 100px;
	height: 100px;
	padding-top: 10px;
	text-align: center;
	color: #fff;
	font-size: 10px;
	white-space: nowrap;
}
</style>
<script type="text/javascript">
function move(elem) {

  var left = 0;
	var top = 0;
	var point = 0;
	var snd = new Audio('swan_lake.mp3');
	snd.load();

  function doMove() {
		snd.play();
		switch (point) {
			case 0:	// +
				left++; // update parameters
				top++;

				elem.style.left = left + 'px'; // show frame
				elem.style.top = top + 'px';

				if (left > 300) {
					point = 1;
				}
				break;
			case 1:	// -
				left--; // update parameters
				elem.style.left = left + 'px'; // show frame
				if (left < 20) {
					point = 2; // check the changing condition
				}
				break;
			case 2:	// +
				left++;		// update parameters
				top = top + 0.4;
				elem.style.left = left + 'px';		// show frame
				elem.style.top = top + 'px';
				if (top > 580) {
					clearInterval(id);		// check the finishing condition
					snd.pause();		// pause the music;
				}
				break;
		}
	}
	var id = setInterval(doMove, 10) // draw every 10ms

}

</script>
</head>
<body>
<div onclick="move(this.children[0])" class="example_path">
 <div class="example_block" id="gr"></div>
</div>
<audio controls>
	<source src="swan_lake.mp3" type="audio/mpeg">
</audio>
</body>
</html>
